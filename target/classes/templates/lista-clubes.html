<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lista de Clubes</title>
</head>
<body class="container mt-4">
    <h2>Gestión de Clubes</h2>

    <form th:action="@{/clubes/buscar}" method="get" class="d-flex mb-3">
        <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre..." required>
        <button type="submit" class="btn btn-info text-white">Buscar</button>
    </form>

    <table class="table table-hover border">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Entrenador</th>
                <th>Asociación</th>
                <th>Competiciones</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${clubes}">
                <td th:text="${c.nombre}" class="fw-bold"></td>
                <td th:text="${c.entrenador != null ? c.entrenador.nombre + ' ' + c.entrenador.apellido : 'Sin asignar'}"></td>
                <td th:text="${c.asociacion != null ? c.asociacion.nombre : 'Sin asignar'}"></td>
                <td>
                    <span th:each="comp, iter : ${c.competiciones}" 
                          th:text="${comp.nombre} + ${!iter.last ? ', ' : ''}"></span>
                </td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/clubes/editar/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/clubes/eliminar/{id}(id=${c.id})}" 
                           class="btn btn-sm btn-danger" 
                           onclick="return confirm('¿Eliminar este club?')">Borrar</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/clubes/nuevo}" class="btn btn-success">Nuevo Club</a>
        <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
    </div>
</body>
</html>
