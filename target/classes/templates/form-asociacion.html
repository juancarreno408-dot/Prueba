<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulario Asociación</title>
</head>
<body class="container mt-5">
    <h3>Formulario Asociación</h3>
    
    <form th:action="@{/asociaciones/guardar}" th:object="${asociacion}" method="post">
        <input type="hidden" th:field="*{id}">
        
        <div class="mb-3">
            <label class="form-label">Nombre de la Asociación</label>
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: FIFA" required>
        </div>

        <div class="mb-3">
            <label class="form-label">País</label>
            <input type="text" th:field="*{pais}" class="form-control" placeholder="Ej: Suiza" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Presidente</label>
            <input type="text" th:field="*{presidente}" class="form-control" placeholder="Nombre del presidente" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/asociaciones}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
