<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulario Jugador</title>
</head>
<body class="container mt-5">
    <h3>Formulario Jugador</h3>
    
    <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Lionel" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Messi" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Número de Camiseta</label>
            <input type="number" th:field="*{numero}" class="form-control" placeholder="Ej: 10" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Posición</label>
            <input type="text" th:field="*{posicion}" class="form-control" placeholder="Ej: Delantero" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/jugadores}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
