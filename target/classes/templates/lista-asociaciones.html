<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lista de Asociaciones</title>
</head>
<body class="container mt-4">
    <h2>Gestión de Asociaciones</h2>

    <form th:action="@{/asociaciones/buscar}" method="get" class="d-flex mb-3">
        <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre..." required>
        <button type="submit" class="btn btn-info text-white">Buscar</button>
    </form>

    <table class="table table-striped border">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>País</th>
                <th>Presidente</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${asociaciones}">
                <td th:text="${a.nombre}"></td>
                <td th:text="${a.pais}"></td>
                <td th:text="${a.presidente}"></td>
                <td>
                    <a th:href="@{/asociaciones/editar/{id}(id=${a.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/asociaciones/eliminar/{id}(id=${a.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('¿Estás seguro de eliminar esta asociación?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/asociaciones/nuevo}" class="btn btn-success">Nueva Asociación</a>
        <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
    </div>
</body>
</html>
