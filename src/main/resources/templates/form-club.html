<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulario Club</title>
</head>
<body class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Registro de Club</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/clubes/guardar}" th:object="${club}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre del Club</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Entrenador</label>
                    <select th:field="*{entrenador}" class="form-select" required>
                        <option value="">Seleccione un entrenador...</option>
                        <option th:each="e : ${entrenadores}" th:value="${e.id}" th:text="${e.nombre} + ' ' + ${e.apellido}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Asociación</label>
                    <select th:field="*{asociacion}" class="form-select" required>
                        <option value="">Seleccione asociación...</option>
                        <option th:each="a : ${asociaciones}" th:value="${a.id}" th:text="${a.nombre}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Competiciones (Usa Ctrl para elegir varias)</label>
                    <select th:field="*{competiciones}" class="form-select" multiple>
                        <option th:each="c : ${competiciones}" th:value="${c.id}" th:text="${c.nombre}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Guardar Club</button>
                <a th:href="@{/clubes}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
