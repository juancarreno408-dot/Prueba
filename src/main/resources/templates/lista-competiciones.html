<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lista de Competiciones</title>
</head>
<body class="container mt-4">
    <h2>Competiciones</h2>
    
    <form th:action="@{/competiciones/buscar}" method="get" class="d-flex mb-3">
        <input type="text" name="q" class="form-control me-2" placeholder="Buscar..." required>
        <button type="submit" class="btn btn-info text-white">Buscar</button>
    </form>

    <table class="table border table-striped">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Monto Premio</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${competiciones}">
                <td th:text="${c.nombre}"></td>
                <td th:text="${c.montoPremio}"></td>
                <td th:text="${c.fechaInicio}"></td>
                <td th:text="${c.fechaFin}"></td>
                <td>
                    <a th:href="@{/competiciones/editar/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/competiciones/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Seguro?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/competiciones/nuevo}" class="btn btn-success">Nuevo</a>
        <a th:href="@{/}" class="btn btn-secondary">Volver</a>
    </div>
</body>
</html>
