<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lista de Entrenadores</title>
</head>
<body class="container mt-4">
    <h2>Gestión de Entrenadores</h2>

    <form th:action="@{/entrenadores/buscar}" method="get" class="d-flex mb-3">
        <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre..." required>
        <button type="submit" class="btn btn-info text-white">Buscar</button>
    </form>

    <table class="table table-striped border">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Nacionalidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${entrenadores}">
                <td th:text="${e.nombre}"></td>
                <td th:text="${e.apellido}"></td>
                <td th:text="${e.edad}"></td>
                <td th:text="${e.nacionalidad}"></td>
                <td>
                    <a th:href="@{/entrenadores/editar/{id}(id=${e.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/entrenadores/eliminar/{id}(id=${e.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('¿Eliminar este entrenador?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/entrenadores/nuevo}" class="btn btn-success">Nuevo Entrenador</a>
        <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
    </div>
</body>
</html>
