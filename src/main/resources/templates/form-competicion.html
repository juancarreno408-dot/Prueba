<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulario Competición</title>
</head>
<body class="container mt-5">
    <h3>Formulario Competición</h3>
    
    <form th:action="@{/competiciones/guardar}" th:object="${competicion}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre del Torneo</label>
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Copa Libertadores" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Monto del Premio</label>
            <input type="number" th:field="*{montoPremio}" class="form-control" placeholder="Ej: 5000000" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de Inicio</label>
            <input type="date" th:field="*{fechaInicio}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de Fin</label>
            <input type="date" th:field="*{fechaFin}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/competiciones}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
