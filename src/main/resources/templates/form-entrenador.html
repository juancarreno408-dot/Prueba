<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulario Entrenador</title>
</head>
<body class="container mt-5">
    <h3>Formulario Entrenador</h3>
    
    <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Pep" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Guardiola" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Edad</label>
            <input type="number" th:field="*{edad}" class="form-control" placeholder="Ej: 53" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nacionalidad</label>
            <input type="text" th:field="*{nacionalidad}" class="form-control" placeholder="Ej: Española" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/entrenadores}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
