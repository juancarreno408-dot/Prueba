<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lista de Jugadores</title>
</head>
<body class="container mt-4">
    <h2>Gestión de Jugadores</h2>

    <form th:action="@{/jugadores/buscar}" method="get" class="d-flex mb-3">
        <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre o posición..." required>
        <button type="submit" class="btn btn-info text-white">Buscar</button>
    </form>

    <table class="table table-striped border">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Dorsal</th>
                <th>Posición</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="j : ${jugadores}">
                <td th:text="${j.nombre}"></td>
                <td th:text="${j.apellido}"></td>
                <td th:text="${j.numero}"></td>
                <td th:text="${j.posicion}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/jugadores/eliminar/{id}(id=${j.id})}" 
                           class="btn btn-sm btn-danger" 
                           onclick="return confirm('¿Eliminar este jugador?')">Borrar</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/jugadores/nuevo}" class="btn btn-success">Nuevo Jugador</a>
        <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
    </div>
</body>
</html>
